name: "Build and Test"

on:
  push:
    branches:
      - developer
      - master
    paths-ignore:
      - '**/*.md'
      - '**/*.gitignore'
      - '**/*.gitattributes'
  workflow_dispatch:
    branches:
      - developer
      - master
    paths-ignore:
      - '**/*.md'
      - '**/*.gitignore'
      - '**/*.gitattributes'

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true
  DOTNET_GENERATE_ASPNET_CERTIFICATE: false
  DOTNET_ADD_GLOBAL_TOOLS_TO_PATH: false
  DOTNET_MULTILEVEL_LOOKUP: 0
  KEYVAULT_NAME: alimentaestaideia-key

jobs:
  build:
    name: Build
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v5
    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 9.0.x
    - name: Cache build output
      uses: actions/cache@v5
      with:
        path: |
          **/bin
          **/obj
        key: build-${{ github.sha }}
    - name: Restore
      run: dotnet restore
    - name: Build
      run: dotnet build --configuration Release --no-restore -v n

  migrate:
    name: Apply database migrations
    needs: build
    if: github.ref == 'refs/heads/developer'
    runs-on: windows-latest
    env:
      DOTNET_ADD_GLOBAL_TOOLS_TO_PATH: true

    steps:
    - uses: actions/checkout@v5
    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 9.0.x
    - name: Login to Azure
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIAL }}
    - name: Load connection strings from Key Vault
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Stop'
        $default = az keyvault secret show `
          --vault-name $env:KEYVAULT_NAME `
          --name 'ConnectionStrings--DefaultConnection' `
          --query value -o tsv
        if ([string]::IsNullOrWhiteSpace($default)) {
          throw "Key Vault secret ConnectionStrings--DefaultConnection was not found."
        }
        "CONNECTIONSTRINGS__DEFAULTCONNECTION=$default" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        $infra = az keyvault secret show `
          --vault-name $env:KEYVAULT_NAME `
          --name 'ConnectionStrings:Infrastructure' `
          --query value -o tsv 2>$null
        if (-not [string]::IsNullOrWhiteSpace($infra)) {
          "CONNECTIONSTRINGS__INFRASTRUCTURE=$infra" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        }
    - name: Apply pending EF migrations
      shell: pwsh
      run: ./scripts/apply-database-migrations.ps1 -RepositoryRoot "${{ github.workspace }}"

  test:
    name: Test ${{ matrix.name }}
    needs: [build, migrate]
    if: always() && needs.build.result == 'success' && (needs.migrate.result == 'success' || needs.migrate.result == 'skipped')
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Repository
            project: BancoAlimentar.AlimentaEstaIdeia.Repository.Tests/BancoAlimentar.AlimentaEstaIdeia.Repository.Tests.csproj
          - name: Sas.Core
            project: BancoAlimentar.AlimentaEstaIdeia.Sas.Core.Tests/BancoAlimentar.AlimentaEstaIdeia.Sas.Core.Tests.csproj
          - name: Integration
            project: BancoAlimentar.AlimentaEstaldeia.Web.IntegrationTests/BancoAlimentar.AlimentaEstaldeia.Web.Integration.Tests.csproj
          - name: Function
            project: BancoAlimentar.AlimentaEstaIdeia.Function.Tests/BancoAlimentar.AlimentaEstaIdeia.Function.Tests.csproj

    steps:
    - uses: actions/checkout@v5
    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 9.0.x
    - name: Restore build output
      uses: actions/cache@v5
      with:
        path: |
          **/bin
          **/obj
        key: build-${{ github.sha }}
    - name: Restore
      run: dotnet restore
    - name: Test with coverage
      run: dotnet test ${{ matrix.project }} --configuration Release --no-build --no-restore --verbosity normal --settings coverlet.runsettings --collect:"XPlat Code Coverage" --results-directory "${{ github.workspace }}/coverage/${{ matrix.name }}"
    - name: Upload coverage reports
      uses: actions/upload-artifact@v6
      if: always()
      with:
        name: coverage-${{ matrix.name }}
        path: coverage/${{ matrix.name }}/**/coverage.cobertura.xml
        if-no-files-found: warn

  coverage:
    name: Collect coverage
    needs: test
    if: always()
    runs-on: windows-latest

    steps:
    - name: Download coverage reports
      uses: actions/download-artifact@v6
      with:
        pattern: coverage-*
        merge-multiple: true
        path: coverage
    - name: Upload combined coverage reports
      uses: actions/upload-artifact@v6
      with:
        name: code-coverage
        path: coverage/**/coverage.cobertura.xml
        if-no-files-found: warn
