name: "Build and Test"

on:
  push:
    branches:
      - developer
      - master
    paths-ignore:
      - '**/*.md'
      - '**/*.gitignore'
      - '**/*.gitattributes'
  workflow_dispatch:
    branches:
      - developer
      - master
    paths-ignore:
      - '**/*.md'
      - '**/*.gitignore'
      - '**/*.gitattributes'

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true
  DOTNET_GENERATE_ASPNET_CERTIFICATE: false
  DOTNET_ADD_GLOBAL_TOOLS_TO_PATH: false
  DOTNET_MULTILEVEL_LOOKUP: 0

jobs:
  build:
    name: Build
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v5
    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: Restore
      run: dotnet restore
    - name: Build
      run: dotnet build --configuration Release --no-restore -v n
    - name: Upload build output
      uses: actions/upload-artifact@v6
      with:
        name: dotnet-release-build
        path: |
          **/bin/Release/
          **/obj/
        if-no-files-found: error
        retention-days: 1

  test:
    name: Test ${{ matrix.name }}
    needs: build
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Repository
            project: BancoAlimentar.AlimentaEstaIdeia.Repository.Tests/BancoAlimentar.AlimentaEstaIdeia.Repository.Tests.csproj
          - name: Sas.Core
            project: BancoAlimentar.AlimentaEstaIdeia.Sas.Core.Tests/BancoAlimentar.AlimentaEstaIdeia.Sas.Core.Tests.csproj
          - name: Integration
            project: BancoAlimentar.AlimentaEstaldeia.Web.IntegrationTests/BancoAlimentar.AlimentaEstaldeia.Web.Integration.Tests.csproj
          - name: Function
            project: BancoAlimentar.AlimentaEstaIdeia.Function.Tests/BancoAlimentar.AlimentaEstaIdeia.Function.Tests.csproj

    steps:
    - uses: actions/checkout@v5
    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: Download build output
      uses: actions/download-artifact@v6
      with:
        name: dotnet-release-build
        path: .
    - name: Restore
      run: dotnet restore
    - name: Build test project
      run: dotnet build ${{ matrix.project }} --configuration Release --no-restore
    - name: Test with coverage
      run: dotnet test ${{ matrix.project }} --configuration Release --no-build --verbosity normal --settings coverlet.runsettings --collect:"XPlat Code Coverage" --results-directory "${{ github.workspace }}/coverage/${{ matrix.name }}"
    - name: Upload coverage reports
      uses: actions/upload-artifact@v6
      if: always()
      with:
        name: coverage-${{ matrix.name }}
        path: coverage/${{ matrix.name }}/**/coverage.cobertura.xml
        if-no-files-found: warn

  coverage:
    name: Collect coverage
    needs: test
    if: always()
    runs-on: windows-latest

    steps:
    - name: Download coverage reports
      uses: actions/download-artifact@v6
      with:
        pattern: coverage-*
        merge-multiple: true
        path: coverage
    - name: Upload combined coverage reports
      uses: actions/upload-artifact@v6
      with:
        name: code-coverage
        path: coverage/**/coverage.cobertura.xml
        if-no-files-found: warn
